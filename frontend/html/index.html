<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igreja Aberta - HTML Vanilla</title>
    <link rel="stylesheet" href="/assets/css/login.min.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div id="signin-form" class="form">
                <figure>
                    <img src="/img/logo.webp" alt="IgAber" />
                </figure>
                <div class="input-group">
                    <input type="email" placeholder="Email" id="login-email">
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" id="login-password">
                    <a href="#" class="forgot-password" id="forgot-password">Esqueci a senha</a>
                </div>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="remember-me"> Mantenha-me logado
                    </label>
                </div>
                <!-- <button class="btn-primary" id="signin-btn">Entrar</button> -->
                <a href="home.html" class="btn-primary" id="signin-btn">Entrar</a>
            </div>
        </div>
    </div>
    <script src="/assets/js/login.min.js"></script>
</body>
</html>
